name: Build

on:
  push:
    tags:
      - "*"

jobs:
  linux-binary:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Build binary
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            quay.io/pypa/manylinux2014_x86_64 \
            /bin/bash -lc '
              curl -LsSf https://astral.sh/uv/install.sh | sh
              /root/.local/bin/uv sync --group build
              /root/.local/bin/uv run pyinstaller \
                --onefile \
                --clean \
                --name bazarr-subsync \
                --paths src \
                --add-binary "bin/alass:bin" \
                src/bazarr_subsync/__main__.py
            '

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bazarr-subsync-linux-x86_64
          path: dist/bazarr-subsync
